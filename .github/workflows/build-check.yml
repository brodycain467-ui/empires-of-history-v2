name: C# Build Check

on:
  push:
    branches:
      - main
      - 'copilot/**'
  pull_request:

jobs:
  build:
    name: dotnet build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: copilot/copilotcopilotevent-framework-implementation-archi
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restore
        run: dotnet restore EmpiresOfHistoryV2.csproj

      - name: Build
        run: dotnet build EmpiresOfHistoryV2.csproj --configuration Release --no-restore

      - name: Run unit tests
        run: |
          if [ -f tests/EmpiresOfHistoryV2.Tests.csproj ]; then
            dotnet test tests/EmpiresOfHistoryV2.Tests.csproj --verbosity normal
          else
            echo "No test project — skipping."
          fi
